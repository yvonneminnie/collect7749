<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>音樂收藏程式</title>
    <!-- Tailwind CSS (樣式) -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- FontAwesome (圖示) -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        /* 隱藏捲軸但保持可捲動 */
        .no-scrollbar::-webkit-scrollbar {
            display: none;
        }
        .no-scrollbar {
            -ms-overflow-style: none;
            scrollbar-width: none;
        }
    </style>
</head>
<body class="bg-gray-100 font-sans text-gray-800 antialiased overflow-hidden">

    <!-- Loading 畫面 -->
    <div id="loading-view" class="flex h-screen w-full items-center justify-center bg-gray-50 text-gray-500 absolute inset-0 z-50">
        <i class="fa-solid fa-spinner fa-spin text-3xl"></i>
        <span class="ml-3 font-medium text-lg">載入中...</span>
    </div>

    <!-- 登入畫面 -->
    <div id="login-view" class="hidden flex h-screen w-full items-center justify-center bg-gray-100 absolute inset-0 z-40">
        <div class="bg-white p-10 rounded-2xl shadow-xl max-w-md w-full text-center">
            <div class="bg-indigo-500 w-16 h-16 rounded-2xl flex items-center justify-center mx-auto mb-6 shadow-lg">
                <i class="fa-solid fa-music text-3xl text-white"></i>
            </div>
            <h1 class="text-2xl font-bold text-gray-800 mb-2">音樂收藏程式</h1>
            <p class="text-gray-500 mb-8">請登入您的帳號以管理專屬的音樂清單</p>
            
            <div id="auth-error" class="hidden mb-4 p-3 bg-red-50 text-red-600 text-sm rounded-lg"></div>

            <button id="btn-login" class="w-full flex items-center justify-center bg-indigo-600 text-white py-3 px-4 rounded-xl font-medium hover:bg-indigo-700 transition-colors shadow-md">
                <i class="fa-brands fa-google mr-2"></i>
                使用 Google 帳號登入
            </button>
        </div>
    </div>

    <!-- 主程式畫面 -->
    <div id="app-view" class="hidden flex h-screen w-full">
        
        <!-- 側邊欄 -->
        <div class="w-64 bg-slate-900 text-slate-300 flex flex-col shadow-xl z-10 flex-shrink-0 h-full">
            <div class="p-6 pb-2 flex items-center space-x-3 text-white">
                <div class="bg-indigo-500 p-2 rounded-lg">
                    <i class="fa-solid fa-music text-xl"></i>
                </div>
                <h1 class="text-xl font-bold tracking-wider">MusicBox</h1>
            </div>
            
            <div class="p-4 flex-1 overflow-y-auto mt-4 no-scrollbar">
                <div class="text-xs font-semibold text-slate-500 uppercase tracking-wider mb-4 px-2 flex justify-between items-center">
                    <span>我的清單</span>
                </div>

                <!-- 播放清單列表容器 -->
                <div id="playlist-container" class="space-y-1"></div>

                <!-- 新增清單表單 -->
                <form id="form-add-playlist" class="hidden mt-4 px-2">
                    <input type="text" id="input-playlist-name" placeholder="清單名稱..." class="w-full bg-slate-800 text-white text-sm rounded border border-slate-700 p-2 focus:outline-none focus:border-indigo-500" required>
                    <div class="flex space-x-2 mt-2">
                        <button type="submit" class="text-xs bg-indigo-500 text-white px-3 py-1 rounded hover:bg-indigo-600 transition">建立</button>
                        <button type="button" id="btn-cancel-playlist" class="text-xs text-slate-400 hover:text-white px-2">取消</button>
                    </div>
                </form>

                <!-- 新增清單按鈕 -->
                <button id="btn-show-add-playlist" class="mt-4 flex items-center text-sm text-slate-400 hover:text-white transition-colors px-3 py-2 w-full">
                    <i class="fa-solid fa-plus mr-2"></i>
                    新增播放清單
                </button>
            </div>
            
            <!-- 使用者狀態列 -->
            <div class="p-4 border-t border-slate-800 text-xs text-slate-500 flex flex-col space-y-3">
                <div class="flex items-center justify-between text-slate-300">
                    <div class="flex items-center truncate">
                        <img id="user-avatar" src="" alt="avatar" class="w-6 h-6 rounded-full mr-2 object-cover">
                        <span id="user-name" class="truncate w-32"></span>
                    </div>
                </div>
                <button id="btn-logout" class="flex items-center justify-center w-full bg-slate-800 hover:bg-slate-700 text-slate-300 py-1.5 rounded transition-colors">
                    <i class="fa-solid fa-right-from-bracket mr-1.5"></i>登出
                </button>
            </div>
        </div>

        <!-- 主要內容區 -->
        <div class="flex-1 flex flex-col h-screen overflow-hidden bg-white">
            <!-- 頂部標題列 -->
            <header class="px-8 py-6 border-b border-gray-100 flex justify-between items-end bg-white/80 backdrop-blur-sm z-10">
                <div>
                    <h2 id="header-title" class="text-3xl font-extrabold text-gray-800 tracking-tight">歡迎使用</h2>
                    <p id="header-subtitle" class="text-sm text-gray-500 mt-1">載入中...</p>
                </div>
                <button id="btn-show-add-song" class="hidden flex items-center bg-indigo-600 text-white px-5 py-2.5 rounded-full font-medium hover:bg-indigo-700 transition-colors shadow-sm hover:shadow-md">
                    <i class="fa-solid fa-plus mr-2"></i> 加入音樂
                </button>
            </header>

            <!-- 歌曲網格/空白提示容器 -->
            <div id="songs-container" class="flex-1 overflow-y-auto p-8 bg-gray-50/50">
                <!-- 動態內容將渲染在這裡 -->
            </div>
        </div>
    </div>

    <!-- 新增音樂 Modal -->
    <div id="modal-add-song" class="hidden fixed inset-0 bg-black/60 backdrop-blur-sm flex items-center justify-center z-50 p-4 opacity-0 transition-opacity duration-300">
        <div class="bg-white rounded-2xl shadow-2xl w-full max-w-md overflow-hidden transform scale-95 transition-transform duration-300" id="modal-add-song-content">
            <div class="px-6 py-4 border-b border-gray-100 flex justify-between items-center">
                <h3 class="text-lg font-bold text-gray-800">新增音樂收藏</h3>
                <button id="btn-close-modal" class="text-gray-400 hover:text-gray-600 hover:bg-gray-100 w-8 h-8 flex items-center justify-center rounded-full transition-colors">
                    <i class="fa-solid fa-xmark"></i>
                </button>
            </div>
            
            <form id="form-add-song" class="p-6 space-y-5">
                <!-- 網址輸入 -->
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">音樂網址 (必填)</label>
                    <input type="url" id="input-song-url" required placeholder="https://www.youtube.com/watch?v=..." class="w-full border border-gray-300 rounded-lg px-4 py-2.5 focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:border-transparent text-sm">
                    <p class="text-xs text-gray-500 mt-1.5">✨ 提示：貼上 YouTube 網址會自動抓取封面圖片喔！</p>
                </div>

                <!-- 歌名輸入 -->
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">歌曲名稱 (必填)</label>
                    <input type="text" id="input-song-title" required placeholder="例如：周杰倫 - 晴天" class="w-full border border-gray-300 rounded-lg px-4 py-2.5 focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:border-transparent text-sm">
                </div>

                <!-- 封面圖片網址 / 上傳 -->
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1 flex items-center">
                        <i class="fa-regular fa-image mr-1"></i> 封面圖片網址 (或上傳圖片)
                    </label>
                    <div class="space-y-2">
                        <input type="url" id="input-song-cover" placeholder="圖片 URL..." class="w-full border border-gray-300 rounded-lg px-4 py-2.5 focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:border-transparent text-sm">
                        
                        <div class="relative">
                            <input type="file" accept="image/*" id="input-file-upload" class="hidden">
                            <label for="input-file-upload" class="flex items-center justify-center w-full border border-dashed border-gray-400 text-gray-600 rounded-lg px-4 py-2 hover:bg-gray-50 cursor-pointer text-sm transition-colors">
                                <i class="fa-solid fa-upload mr-2"></i>上傳本機圖片 (轉為 Base64)
                            </label>
                        </div>
                    </div>
                </div>

                <!-- 預覽圖片 -->
                <div id="preview-container" class="hidden mt-4 relative rounded-lg overflow-hidden border border-gray-200 aspect-video bg-gray-50 flex items-center justify-center">
                    <img id="preview-img" src="" alt="Cover Preview" class="object-cover w-full h-full">
                    <div class="absolute top-2 left-2 bg-black/60 text-white text-xs px-2 py-1 rounded backdrop-blur-md">封面預覽</div>
                </div>

                <!-- 按鈕區 -->
                <div class="pt-4 flex space-x-3">
                    <button type="button" id="btn-cancel-modal" class="flex-1 bg-white border border-gray-300 text-gray-700 py-2.5 rounded-lg font-medium hover:bg-gray-50 transition-colors text-sm">取消</button>
                    <button type="submit" class="flex-1 bg-indigo-600 text-white py-2.5 rounded-lg font-medium hover:bg-indigo-700 transition-colors text-sm shadow-sm">儲存音樂</button>
                </div>
            </form>
        </div>
    </div>

    <!-- 核心邏輯 (使用模組匯入) -->
    <script type="module">
        // 匯入 Firebase SDK (根據您提供的 12.12.1 版本，為保證穩定性，這裡使用官方目前穩定的 CDN 路徑結構，但對應模組)
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, signInWithPopup, GoogleAuthProvider, signOut, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, collection, onSnapshot, addDoc, deleteDoc, doc } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        // Firebase 專案設定 (使用您提供的金鑰與專案資訊)
        const firebaseConfig = {
            apiKey: "AIzaSyCBcLJfjuMF7M_mz4enGJ7ZntIz5AHSq_E",
            authDomain: "collect7749.firebaseapp.com",
            projectId: "collect7749",
            storageBucket: "collect7749.firebasestorage.app",
            messagingSenderId: "591388705465",
            appId: "1:591388705465:web:76f30866e4b79509c4d168",
            measurementId: "G-G8X7JRFBKL"
        };

        // 初始化 Firebase
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        // 狀態管理
        let currentUser = null;
        let playlistsData = [];
        let songsData = [];
        let activePlaylistId = null;
        let unsubPlaylists = null;
        let unsubSongs = null;

        // --- DOM 元素快取 ---
        const views = {
            loading: document.getElementById('loading-view'),
            login: document.getElementById('login-view'),
            app: document.getElementById('app-view')
        };
        const elements = {
            loginBtn: document.getElementById('btn-login'),
            logoutBtn: document.getElementById('btn-logout'),
            authError: document.getElementById('auth-error'),
            userName: document.getElementById('user-name'),
            userAvatar: document.getElementById('user-avatar'),
            
            playlistContainer: document.getElementById('playlist-container'),
            formAddPlaylist: document.getElementById('form-add-playlist'),
            btnShowAddPlaylist: document.getElementById('btn-show-add-playlist'),
            btnCancelPlaylist: document.getElementById('btn-cancel-playlist'),
            inputPlaylistName: document.getElementById('input-playlist-name'),
            
            headerTitle: document.getElementById('header-title'),
            headerSubtitle: document.getElementById('header-subtitle'),
            btnShowAddSong: document.getElementById('btn-show-add-song'),
            songsContainer: document.getElementById('songs-container'),
            
            modalAddSong: document.getElementById('modal-add-song'),
            modalContent: document.getElementById('modal-add-song-content'),
            formAddSong: document.getElementById('form-add-song'),
            btnCloseModal: document.getElementById('btn-close-modal'),
            btnCancelModal: document.getElementById('btn-cancel-modal'),
            
            inputSongUrl: document.getElementById('input-song-url'),
            inputSongTitle: document.getElementById('input-song-title'),
            inputSongCover: document.getElementById('input-song-cover'),
            inputFileUpload: document.getElementById('input-file-upload'),
            previewContainer: document.getElementById('preview-container'),
            previewImg: document.getElementById('preview-img')
        };

        // --- Auth 認證邏輯 ---
        onAuthStateChanged(auth, (user) => {
            views.loading.classList.add('hidden');
            if (user) {
                currentUser = user;
                views.login.classList.add('hidden');
                views.app.classList.remove('hidden');
                elements.userName.textContent = user.displayName || user.email;
                elements.userAvatar.src = user.photoURL || 'https://ui-avatars.com/api/?name=' + encodeURIComponent(user.email) + '&background=random';
                
                setupFirestoreListeners(user.uid);
            } else {
                currentUser = null;
                views.login.classList.remove('hidden');
                views.app.classList.add('hidden');
                cleanupFirestoreListeners();
                playlistsData = [];
                songsData = [];
                activePlaylistId = null;
            }
        });

        elements.loginBtn.addEventListener('click', async () => {
            try {
                const provider = new GoogleAuthProvider();
                await signInWithPopup(auth, provider);
            } catch (error) {
                console.error("Login failed:", error);
                elements.authError.textContent = "登入失敗，請確認 Firebase 已啟用 Google 登入。";
                elements.authError.classList.remove('hidden');
            }
        });

        elements.logoutBtn.addEventListener('click', () => {
            signOut(auth);
        });

        // --- Firestore 資料邏輯 ---
        function setupFirestoreListeners(uid) {
            cleanupFirestoreListeners(); // 確保舊的監聽被清除

            const playlistsRef = collection(db, 'users', uid, 'playlists');
            const songsRef = collection(db, 'users', uid, 'songs');

            unsubPlaylists = onSnapshot(playlistsRef, (snapshot) => {
                playlistsData = snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }));
                playlistsData.sort((a, b) => (a.createdAt || 0) - (b.createdAt || 0));
                
                if (playlistsData.length > 0 && !activePlaylistId) {
                    activePlaylistId = playlistsData[0].id;
                } else if (playlistsData.length === 0) {
                    activePlaylistId = null;
                }
                
                renderPlaylists();
                renderMainContent();
            }, (error) => console.error("Playlists fetch error:", error));

            unsubSongs = onSnapshot(songsRef, (snapshot) => {
                songsData = snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }));
                songsData.sort((a, b) => (b.createdAt || 0) - (a.createdAt || 0));
                renderMainContent();
            }, (error) => console.error("Songs fetch error:", error));
        }

        function cleanupFirestoreListeners() {
            if (unsubPlaylists) unsubPlaylists();
            if (unsubSongs) unsubSongs();
        }

        // --- UI 渲染邏輯 ---
        function renderPlaylists() {
            elements.playlistContainer.innerHTML = '';
            
            playlistsData.forEach(pl => {
                const isActive = activePlaylistId === pl.id;
                const btnClasses = isActive 
                    ? 'w-full flex items-center justify-between px-3 py-2.5 rounded-lg text-sm transition-colors group bg-indigo-600/20 text-indigo-400 font-medium'
                    : 'w-full flex items-center justify-between px-3 py-2.5 rounded-lg text-sm transition-colors group hover:bg-slate-800 hover:text-white text-slate-300';
                
                const html = `
                    <button class="${btnClasses} playlist-item" data-id="${pl.id}">
                        <div class="flex items-center truncate">
                            <i class="fa-solid fa-list mr-3 opacity-70"></i>
                            <span class="truncate">${escapeHtml(pl.name)}</span>
                        </div>
                        <div class="opacity-0 group-hover:opacity-100 p-1 hover:text-red-400 hover:bg-slate-700 rounded transition-all delete-playlist" data-id="${pl.id}">
                            <i class="fa-solid fa-trash text-xs"></i>
                        </div>
                    </button>
                `;
                elements.playlistContainer.insertAdjacentHTML('beforeend', html);
            });
        }

        function renderMainContent() {
            const activeSongs = songsData.filter(s => s.playlistId === activePlaylistId);
            const activePlaylist = playlistsData.find(p => p.id === activePlaylistId);
            
            // 更新 Header
            if (playlistsData.length === 0) {
                elements.headerTitle.textContent = '歡迎使用';
                elements.headerSubtitle.textContent = '共 0 首音樂收藏';
                elements.btnShowAddSong.classList.add('hidden');
            } else {
                elements.headerTitle.textContent = activePlaylist ? activePlaylist.name : '我的收藏';
                elements.headerSubtitle.textContent = `共 ${activeSongs.length} 首音樂收藏`;
                elements.btnShowAddSong.classList.remove('hidden');
            }

            // 更新內容區
            if (playlistsData.length === 0) {
                elements.songsContainer.innerHTML = `
                    <div class="h-full flex flex-col items-center justify-center text-gray-400">
                        <i class="fa-solid fa-list-ul text-6xl mb-4 text-gray-300"></i>
                        <p class="text-lg font-medium text-gray-500">還沒有任何播放清單</p>
                        <p class="text-sm mt-2">請先從左側建立一個清單開始收藏！</p>
                    </div>
                `;
            } else if (activeSongs.length === 0) {
                elements.songsContainer.innerHTML = `
                    <div class="h-full flex flex-col items-center justify-center text-gray-400">
                        <i class="fa-solid fa-music text-6xl mb-4 text-gray-300"></i>
                        <p class="text-lg font-medium text-gray-500">這個清單還是空的</p>
                        <p class="text-sm mt-2">點擊右上角的「加入音樂」按鈕吧！</p>
                    </div>
                `;
            } else {
                let cardsHtml = '<div class="grid grid-cols-2 md:grid-cols-3 lg:grid-cols-4 xl:grid-cols-5 gap-6">';
                activeSongs.forEach(song => {
                    const coverUrl = song.coverUrl || 'https://images.unsplash.com/photo-1470225620780-dba8ba36b745?w=500&q=80';
                    cardsHtml += `
                        <div class="group relative bg-white rounded-xl overflow-hidden shadow-sm hover:shadow-xl transition-all duration-300 border border-gray-100">
                            <div class="aspect-square relative overflow-hidden bg-gray-100">
                                <img src="${escapeHtml(coverUrl)}" alt="Cover" 
                                     class="w-full h-full object-cover transition-transform duration-500 group-hover:scale-105"
                                     onerror="this.onerror=null; this.src='https://images.unsplash.com/photo-1470225620780-dba8ba36b745?w=500&q=80';">
                                <div class="absolute inset-0 bg-black/40 opacity-0 group-hover:opacity-100 transition-opacity duration-300 flex items-center justify-center">
                                    <a href="${escapeHtml(song.url)}" target="_blank" rel="noopener noreferrer" class="bg-indigo-500 text-white p-3 rounded-full hover:bg-indigo-400 transition-transform hover:scale-110 shadow-lg flex items-center justify-center w-12 h-12">
                                        <i class="fa-solid fa-play ml-1"></i>
                                    </a>
                                </div>
                            </div>
                            <div class="p-4">
                                <h3 class="font-semibold text-gray-800 truncate" title="${escapeHtml(song.title)}">${escapeHtml(song.title)}</h3>
                                <div class="flex justify-between items-center mt-3">
                                    <a href="${escapeHtml(song.url)}" target="_blank" class="text-xs text-indigo-500 hover:text-indigo-600 flex items-center">
                                        <i class="fa-solid fa-arrow-up-right-from-square mr-1"></i> 開啟連結
                                    </a>
                                    <button class="text-gray-400 hover:text-red-500 p-1.5 rounded-full hover:bg-red-50 transition-colors delete-song" data-id="${song.id}" title="刪除">
                                        <i class="fa-solid fa-trash"></i>
                                    </button>
                                </div>
                            </div>
                        </div>
                    `;
                });
                cardsHtml += '</div>';
                elements.songsContainer.innerHTML = cardsHtml;
            }
        }

        // --- 互動事件綁定 ---

        // 事件委派：點擊播放清單 或 刪除播放清單
        elements.playlistContainer.addEventListener('click', async (e) => {
            const delBtn = e.target.closest('.delete-playlist');
            if (delBtn) {
                e.stopPropagation();
                if(!currentUser) return;
                const id = delBtn.dataset.id;
                try {
                    await deleteDoc(doc(db, 'users', currentUser.uid, 'playlists', id));
                    // 同時刪除底下的歌曲
                    const songsToDelete = songsData.filter(s => s.playlistId === id);
                    for (const song of songsToDelete) {
                        await deleteDoc(doc(db, 'users', currentUser.uid, 'songs', song.id));
                    }
                } catch (err) { console.error("Delete playlist error:", err); }
                return;
            }

            const plItem = e.target.closest('.playlist-item');
            if (plItem) {
                activePlaylistId = plItem.dataset.id;
                renderPlaylists();
                renderMainContent();
            }
        });

        // 事件委派：刪除歌曲
        elements.songsContainer.addEventListener('click', async (e) => {
            const delBtn = e.target.closest('.delete-song');
            if (delBtn && currentUser) {
                const id = delBtn.dataset.id;
                try {
                    await deleteDoc(doc(db, 'users', currentUser.uid, 'songs', id));
                } catch (err) { console.error("Delete song error:", err); }
            }
        });

        // 顯示/隱藏新增播放清單表單
        elements.btnShowAddPlaylist.addEventListener('click', () => {
            elements.btnShowAddPlaylist.classList.add('hidden');
            elements.formAddPlaylist.classList.remove('hidden');
            elements.inputPlaylistName.focus();
        });
        elements.btnCancelPlaylist.addEventListener('click', () => {
            elements.formAddPlaylist.classList.add('hidden');
            elements.btnShowAddPlaylist.classList.remove('hidden');
            elements.inputPlaylistName.value = '';
        });

        // 提交新增播放清單
        elements.formAddPlaylist.addEventListener('submit', async (e) => {
            e.preventDefault();
            const name = elements.inputPlaylistName.value.trim();
            if (!name || !currentUser) return;

            try {
                const docRef = await addDoc(collection(db, 'users', currentUser.uid, 'playlists'), {
                    name: name,
                    createdAt: Date.now()
                });
                activePlaylistId = docRef.id;
                elements.inputPlaylistName.value = '';
                elements.formAddPlaylist.classList.add('hidden');
                elements.btnShowAddPlaylist.classList.remove('hidden');
            } catch (err) { console.error("Add playlist error:", err); }
        });

        // Modal 控制
        function showModal() {
            elements.modalAddSong.classList.remove('hidden');
            // Timeout for animation
            setTimeout(() => {
                elements.modalAddSong.classList.remove('opacity-0');
                elements.modalContent.classList.remove('scale-95');
                elements.inputSongUrl.focus();
            }, 10);
        }
        function hideModal() {
            elements.modalAddSong.classList.add('opacity-0');
            elements.modalContent.classList.add('scale-95');
            setTimeout(() => {
                elements.modalAddSong.classList.add('hidden');
                elements.formAddSong.reset();
                elements.previewContainer.classList.add('hidden');
                elements.previewImg.src = '';
            }, 300);
        }

        elements.btnShowAddSong.addEventListener('click', showModal);
        elements.btnCloseModal.addEventListener('click', hideModal);
        elements.btnCancelModal.addEventListener('click', hideModal);

        // 半自動擷取 YouTube 封面
        elements.inputSongUrl.addEventListener('input', (e) => {
            const val = e.target.value;
            const ytRegex = /(?:youtube\.com\/(?:[^\/]+\/.+\/|(?:v|e(?:mbed)?)\/|.*[?&]v=)|youtu\.be\/)([^"&?\/\s]{11})/i;
            const match = val.match(ytRegex);
            
            if (match && match[1]) {
                const coverUrl = `https://img.youtube.com/vi/${match[1]}/hqdefault.jpg`;
                elements.inputSongCover.value = coverUrl;
                elements.previewImg.src = coverUrl;
                elements.previewContainer.classList.remove('hidden');
                
                if (!elements.inputSongTitle.value) {
                    elements.inputSongTitle.value = "YouTube 音樂";
                }
            }
        });

        // 封面圖片預覽 (網址輸入)
        elements.inputSongCover.addEventListener('input', (e) => {
            const val = e.target.value;
            if (val) {
                elements.previewImg.src = val;
                elements.previewContainer.classList.remove('hidden');
            } else {
                elements.previewContainer.classList.add('hidden');
            }
        });

        // Base64 本機圖片上傳處理
        elements.inputFileUpload.addEventListener('change', (e) => {
            const file = e.target.files[0];
            if (file) {
                const reader = new FileReader();
                reader.onloadend = () => {
                    const base64String = reader.result;
                    elements.inputSongCover.value = base64String;
                    elements.previewImg.src = base64String;
                    elements.previewContainer.classList.remove('hidden');
                };
                reader.readAsDataURL(file); // 轉成 Base64
            }
        });

        // 提交新增歌曲
        elements.formAddSong.addEventListener('submit', async (e) => {
            e.preventDefault();
            const url = elements.inputSongUrl.value.trim();
            const title = elements.inputSongTitle.value.trim();
            const coverUrl = elements.inputSongCover.value.trim();

            if (!url || !title || !activePlaylistId || !currentUser) return;

            try {
                await addDoc(collection(db, 'users', currentUser.uid, 'songs'), {
                    playlistId: activePlaylistId,
                    url: url,
                    title: title,
                    coverUrl: coverUrl,
                    createdAt: Date.now()
                });
                hideModal();
            } catch (err) { console.error("Add song error:", err); }
        });

        // Utils
        function escapeHtml(unsafe) {
            if(!unsafe) return '';
            return unsafe
                 .replace(/&/g, "&amp;")
                 .replace(/</g, "&lt;")
                 .replace(/>/g, "&gt;")
                 .replace(/"/g, "&quot;")
                 .replace(/'/g, "&#039;");
        }
    </script>
</body>
</html>
